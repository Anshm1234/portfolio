<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- themed monogram badge — matches the navbar logo / ID card:
       warm walnut disc, cream "AM", thin cream ring, small leaf accent -->
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b6534"/>
      <stop offset=".55" stop-color="#7a4f28"/>
      <stop offset="1" stop-color="#5e3c1d"/>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#wood)"/>
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#e9ddcd" stroke-opacity=".38" stroke-width="1.6"/>

  <!-- small leaf accent, bottom-right, echoing the welcome-screen vines -->
  <path d="M45 44 C 51 44 54 40 54 34 C 48 34 45 38 45 44 Z" fill="#7f8a54" opacity=".9"/>

  <text x="32" y="41.5" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="27" letter-spacing="-1.5" fill="#eadfce">AM</text>
</svg>
